services:
  api:
    volumes:
      - ./apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    volumes:
      - ./apps/web:/app
    command: npm run dev
    environment:
      - NODE_ENV=development

  worker:
    volumes:
      - ./apps/worker:/app

  scheduler:
    volumes:
      - ./apps/scheduler:/app
